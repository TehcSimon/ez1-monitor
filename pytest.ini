[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Auto mode: plain `async def test_*` and async fixtures are run on an event
# loop without per-test @pytest.mark.asyncio decorators. Required because the
# runtime image (python:3.14-alpine) removed the implicit-event-loop behavior
# that the old asyncio.get_event_loop().run_until_complete() pattern relied on.
asyncio_mode = auto
