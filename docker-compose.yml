services:
  ez1-monitor:
    build: .
    # Or, after the GitHub Actions workflow has pushed an image:
    # image: ghcr.io/thecsimon/ez1-monitor:latest
    container_name: ez1-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/appdata/ez1-monitor:/data
    # The container runs as non-root (UID 1000, GID 0). If upgrading from
    # v1.0.x, ensure the data directory is writable by UID 1000:
    #   sudo chown -R 1000:0 /mnt/user/appdata/ez1-monitor
    #   sudo chmod -R g=u   /mnt/user/appdata/ez1-monitor
    environment:
      # --- Connection (INVERTER_IP is required, no default) ---
      - INVERTER_IP=192.168.50.123       # REQUIRED — set to your EZ1-M's IP
      - INVERTER_PORT=8050
      - POLL_INTERVAL=60                 # seconds between polls

      # --- Installation ---
      - INSTALL_KWP=1.0                  # installed peak power in kWp

      # --- Data retention ---
      - RETENTION_DAYS=730               # keep raw measurements for N days
                                         # (730 = 2 years for YoY compare).
                                         # Set to 0 to disable pruning.

      # --- Timezone ---
      - TZ=Europe/Berlin                 # IANA tz, e.g. America/New_York

      # --- Localization (leave DEFAULT_LANG empty to auto-detect) ---
      - DEFAULT_LANG=                    # "", "de" or "en"
      - CURRENCY=EUR                     # "EUR" or "USD"

      # --- Economic / environmental factors ---
      - PRICE_PER_KWH=0.35               # local electricity price per kWh
      - CO2_KG_PER_KWH=0.38              # grid CO2 intensity (kg CO2/kWh)
                                         # Used as fallback when Electricity
                                         # Maps integration is disabled or
                                         # unavailable.

      # --- Optional: Electricity Maps live grid CO2 integration ---
      # When ELECTRICITY_MAPS_TOKEN is set, the container fetches live
      # carbon-intensity values for your grid zone once per hour and
      # stamps each measurement with the active factor. The lifetime CO2
      # calculation then becomes historically accurate — daytime polls
      # use the (typically lower) sunny-grid factor, nighttime polls use
      # the (typically higher) coal/gas-heavy factor. Falls back through
      # last-known-value (up to 48h) → rolling average → CO2_KG_PER_KWH
      # if the API is unavailable.
      #
      # Sign up at https://www.electricitymaps.com/free-tier-api (use the
      # "Home Assistant" path for free permanent access). The zone is
      # bound to the token in the portal, so ELECTRICITY_MAPS_ZONE is for
      # the UI display label only.
      # - ELECTRICITY_MAPS_TOKEN=your_token_here
      # - ELECTRICITY_MAPS_ZONE=DE

      # --- Logging ---
      - LOG_LEVEL=INFO
