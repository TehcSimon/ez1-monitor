name: Tests

on:
  # No push trigger: pushes to main (and tags) already run this suite via
  # workflow_call from build-and-push.yml — a push trigger here would run
  # everything twice.
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Match the runtime image (python:3.14-alpine) so the suite tests
          # exactly what ships. Testing on an older minor would mask
          # version-specific behavior changes (e.g. the asyncio event-loop
          # removal in 3.14 that the old test pattern relied on).
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v
